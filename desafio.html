<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ambiental</title>
    <link rel="stylesheet" href="desafio/style.css">
</head>
<body>

    <div class="cadastro-container">
        <div class="cadastro-header">
            <h2>Criar Conta</h2>
            <p>Preencha seus dados para acessar o sistema</p>
        </div>

        <div class="form-group">
            <label for="campo-nome">Nome Completo</label>
            <input type="text" id="campo-nome" placeholder="Digite seu nome completo">

            <label for="campo-idade">Idade</label>
            <input type="number" id="campo-idade" placeholder="Digite sua idade">

            <label for="campo-email">E-mail</label>
            <input type="email" id="campo-email" placeholder="exemplo@email.com">

            <label for="campo-cpf">CPF</label>
            <input type="text" id="campo-cpf" placeholder="000.000.000-00" maxlength="14">

            <label for="campo-endereco">Endereço</label>
            <input type="text" id="campo-endereco" placeholder="Rua, número, bairro">
        </div>

        <button id="btn-cadastrar">Cadastrar Usuário</button>

        <div class="feedback-sistema">
            
        </div>
    </div>

    <script src="desafio/script.js"></script>
</body>
</html>
